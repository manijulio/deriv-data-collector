name: Collecte quotidienne V75

on:
  schedule:
    - cron: '00 10 * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Installer Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Installer les librairies
        run: pip install websockets pandas nest_asyncio

      - name: Lancer la collecte
        run: python collect.py

      - name: Sauvegarder les donnees
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Collecte du $(date +'%Y-%m-%d')"
          git push
